# Local full-stack stack for CollabBoard (mongo + server + client).
# Usage: docker compose up --build
# Then open http://localhost:5173 (client proxies /api + /socket.io to server).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '4000'
      MONGODB_URI: mongodb://mongo:27017/collabboard
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: info
      SMTP_HOST: mailhog
      SMTP_PORT: '1025'
    ports:
      - '4000:4000'

  client:
    build:
      context: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '5173:80'

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI — open http://localhost:8025 to inspect emails

volumes:
  mongo-data:
